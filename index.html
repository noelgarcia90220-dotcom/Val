<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ojos Bonitos by Valerie</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffb6f0, #caa6ff);
    color: white;
    text-align: center;
}

header {
    padding: 40px 20px;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
}

.hero img {
    width: 280px;
    border-radius: 20px;
    margin-top: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.packages {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 40px 0;
}

.card {
    background: rgba(255,255,255,0.2);
    padding: 20px;
    margin: 10px;
    width: 250px;
    border-radius: 15px;
    backdrop-filter: blur(5px);
}

.contact {
    padding: 30px;
    background: rgba(0,0,0,0.2);
}

a {
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>Ojos Bonitos by Valerie</h1>
    <p>Luxury Lash Extensions in Compton, California 💗💜</p>
</header>

<div class="hero">
    <img src="lash.jpg" alt="Lash Work">
</div>

<div class="packages">
    <div class="card">
        <h2>Package 1</h2>
        <p>$50 - Natural Lash Set</p>
    </div>

    <div class="card">
        <h2>Package 2</h2>
        <p>$80 - Hybrid Lash Set</p>
    </div>

    <div class="card">
        <h2>Package 3</h2>
        <p>$100 - Volume Lash Set</p>
    </div>
</div>

<div class="contact">
    <h2>Contact</h2>
    <p>📍 Compton, California</p>
    <p>📞 +1 (323) 849-6124</p>
    <p>📷 Instagram: <a href="#">ojos bonitos by Valerie</a></p>
</div>

</body>
</html>
